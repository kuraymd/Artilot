<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monster Lab</title>
  <meta name="description" content="未知のモンスター標本を報告書形式でランダム生成する創作用ラボです。">
  <link rel="icon" type="image/png" href="../favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Share+Tech+Mono&family=Zen+Kurenaido&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="archive.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js" defer></script>
  <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js" defer></script>
  <script src="script.js" defer></script>
</head>
<body>
  <div class="container">
    <header class="site-header">
      <div class="label-en">IHYLI - CREATURE IDEA TERMINAL</div>
      <h1>Monster Lab</h1>
      <div class="divider"></div>
    </header>

    <main>
      <section class="terminal-panel" aria-label="標本生成端末">
        <p class="data-status" id="dataStatus">研究端末を起動しています...</p>
        <button class="btn-generate" id="generateBtn" type="button" disabled>標本を生成する</button>
      </section>

      <section id="result" class="result" aria-live="polite">
        <div class="placeholder">
          <div class="placeholder-icon">LAB</div>
          <div class="placeholder-text">AWAITING SPECIMEN DATA...</div>
        </div>
      </section>

      <div class="specimen-actions">
        <button class="btn-save" id="saveBtn" type="button" disabled>標本庫に保存する</button>
        <button class="btn-image" id="imageSaveBtn" type="button" disabled>PNG画像で保存する</button>
      </div>

      <section class="archive-section" aria-label="標本アーカイブ">
        <div class="archive-header">
          <span class="archive-title">SPECIMEN ARCHIVE - 標本アーカイブ</span>
          <span class="archive-count" id="archiveCount"></span>
        </div>
        <div id="archiveList" class="archive-list"></div>
      </section>

      <section class="info-section" aria-label="掲示板とリクエスト">
        <div class="info-column">
          <h2>掲示板</h2>
          <div id="newsList" class="info-list" aria-live="polite">
            <p class="info-empty">ラボからの記録や更新情報をここに表示します。</p>
          </div>
        </div>

        <div class="info-column">
          <h2>リクエスト</h2>
          <form id="requestForm" class="request-form">
            <label>
              <span>追加先</span>
              <select name="category">
                <option value="categories">カテゴリ</option>
                <option value="habitats">生息地・シーン</option>
                <option value="species">種族</option>
                <option value="body_features">体の特徴</option>
                <option value="face_features">顔の特徴</option>
                <option value="behaviors">行動</option>
                <option value="abilities">能力</option>
                <option value="comments">コメント</option>
                <option value="nicknames">ニックネーム</option>
                <option value="statuses">ステータス</option>
                <option value="other">その他</option>
              </select>
            </label>
            <label>
              <span>追加してほしい内容</span>
              <textarea name="idea" rows="4" placeholder="例: 雨の日にだけ現れる小さな種族"></textarea>
            </label>
            <button class="request-submit" type="submit">メモする</button>
            <p id="requestStatus" class="request-status">追加調査してほしい標本情報があれば、ここから送れます。</p>
          </form>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
