<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monster Lab</title>
  <meta name="description" content="スプレッドシートで管理したガチャデータから、モンスターアイデアを報告書形式でランダム生成するツールです。">
  <link rel="icon" type="image/png" href="../favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="archive.js" defer></script>
  <script src="script.js" defer></script>
</head>
<body>
  <div class="container">
    <header class="site-header">
      <div class="label-en">IHYLI - CREATURE IDEA TERMINAL</div>
      <h1>Monster Lab</h1>
      <div class="divider"></div>
    </header>

    <main>
      <section class="terminal-panel" aria-label="アイデア生成端末">
        <p class="data-status" id="dataStatus">ガチャデータを読み込み中...</p>
        <button class="btn-generate" id="generateBtn" type="button" disabled>標本を生成する</button>
      </section>

      <section id="result" class="result" aria-live="polite">
        <div class="placeholder">
          <div class="placeholder-icon">IDEA</div>
          <div class="placeholder-text">AWAITING CREATURE IDEA...</div>
        </div>
      </section>

      <button class="btn-save" id="saveBtn" type="button" disabled>このアイデアを保存する</button>

      <section class="archive-section" aria-label="アイデア標本庫">
        <div class="archive-header">
          <span class="archive-title">IDEA ARCHIVE - アイデア標本庫</span>
          <span class="archive-count" id="archiveCount"></span>
        </div>
        <div id="archiveList" class="archive-list"></div>
      </section>

      <section class="info-section" aria-label="お知らせとリクエスト">
        <div class="info-column">
          <h2>お知らせ</h2>
          <div class="info-list">
            <p class="info-empty">ガチャ内容は Google スプレッドシート側の各シートから読み込みます。</p>
          </div>
        </div>

        <div class="info-column">
          <h2>リクエスト</h2>
          <form id="requestForm" class="request-form">
            <label>
              <span>追加してほしい内容</span>
              <textarea name="idea" rows="4" placeholder="例: 雨の日にだけ現れる小さな種族"></textarea>
            </label>
            <button class="request-submit" type="submit">メモする</button>
            <p id="requestStatus" class="request-status">届いたリクエストは、スプレッドシートへ追記して反映してください。</p>
          </form>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
