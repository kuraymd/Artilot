<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monster Idea Generator</title>
  <meta name="description" content="創作に使えるモンスターやキャラクターのアイデアを、テーマ別にランダム生成するツールです。">
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="creatures.js" defer></script>
  <script src="patterns.js" defer></script>
  <script src="archive.js" defer></script>
  <script src="script.js" defer></script>
</head>
<body>
  <div class="container">
    <header class="site-header">
      <div class="label-en">IHYLI - CREATURE IDEA TERMINAL</div>
      <h1>モンスターアイデア<br>生成ツール</h1>
      <div class="divider"></div>
    </header>

    <main>
      <section class="terminal-panel" aria-label="アイデア生成端末">
        <label class="theme-control" for="themeSelect">
          <span>THEME SELECT</span>
          <select id="themeSelect" name="theme"></select>
        </label>
        <label class="theme-control" for="toneSelect">
          <span>TONE SELECT</span>
          <select id="toneSelect" name="tone"></select>
        </label>
        <button class="btn-generate" id="generateBtn" type="button">アイデアを生成する</button>
      </section>

      <section id="result" class="result" aria-live="polite">
        <div class="placeholder">
          <div class="placeholder-icon">IDEA</div>
          <div class="placeholder-text">AWAITING CREATURE IDEA...</div>
        </div>
      </section>

      <button class="btn-save" id="saveBtn" type="button" disabled>このアイデアを保存する</button>

      <section class="archive-section" aria-label="アイデア庫">
        <div class="archive-header">
          <span class="archive-title">IDEA ARCHIVE - アイデア庫</span>
          <span class="archive-count" id="archiveCount"></span>
        </div>
        <div id="archiveList" class="archive-list"></div>
      </section>
    </main>
  </div>
</body>
</html>
