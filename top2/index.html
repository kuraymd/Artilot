<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="IHYLI.com is an illustration portfolio, commission hub, and playful web tool portal."
    />
    <title>IHYLI.com</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;700&family=M+PLUS+Rounded+1c:wght@500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header class="site-header" aria-label="Site header">
      <a class="brand" href="#about" aria-label="IHYLI.com top">
        <span class="brand-orb" aria-hidden="true"></span>
        <span>IHYLI.com</span>
      </a>
      <button
        class="menu-toggle"
        type="button"
        aria-expanded="false"
        aria-controls="site-nav"
      >
        <span class="sr-only">メニューを開く</span>
        <span></span>
        <span></span>
        <span></span>
      </button>
      <nav class="site-nav" id="site-nav" aria-label="Main navigation">
        <a href="#about">About</a>
        <a href="#work">Gallery</a>
        <a href="#tool">Tool</a>
        <a href="#goods">Goods</a>
        <a href="#link">Link</a>
      </nav>
    </header>

    <main class="player-shell" aria-label="IHYLI.com playlist">
      <section class="track-card is-profile" id="about" data-title="About" data-action="./about.html">
        <div class="track-inner">
          <p class="track-number">01 / About</p>
          <div class="art-window portrait">
            <img src="./image/about.JPG" alt="IHYLI.com avatar illustration" />
          </div>
          <div class="track-title">
            <h1>About</h1>
            <p>くらやまだです！イラストや創作ツールを作っています。</p>
          </div>
        </div>
      </section>

      <section class="track-card is-work" id="work" data-title="Gallery" data-action="./work.html">
        <div class="track-inner">
          <p class="track-number">02 / Gallery</p>
          <div class="art-window pattern">
            <img src="./image/work.PNG" alt="Pattern and illustration collage" />
          </div>
          <div class="track-title">
            <h2>Gallery</h2>
            <p>フラットなデフォルメっぽいイラストを描いています！</p>
          </div>
        </div>
      </section>

      <section class="track-card is-tool" id="tool" data-title="Tool" data-action="./tool.html">
        <div class="track-inner">
          <p class="track-number">03 / Tool</p>
          <div class="art-window pattern">
            <img src="./image/tool.JPG" alt="Tool thumbnail" />
          </div>
          <div class="track-title">
            <h2>Tool</h2>
            <p>アイデア出しやネタ画像など遊べるWebツール！</p>
          </div>
        </div>
      </section>

      <section class="track-card is-goods" id="goods" data-title="Goods" data-action="./goods.html">
        <div class="track-inner">
          <p class="track-number">04 / Goods</p>
          <div class="art-window pattern">
            <img src="./image/goods.webp" alt="Goods and material thumbnail" />
          </div>
          <div class="track-title">
            <h2>Goods</h2>
            <p>ステッカーやアクリルグッズ、創作に使える素材など。</p>
          </div>
        </div>
      </section>

      <section class="track-card is-link" id="link" data-title="Link" data-action="./link.html">
        <div class="track-inner">
          <p class="track-number">05 / Link</p>
          <div class="art-window pattern">
            <img src="./image/link.JPG" alt="Link thumbnail" />
          </div>
          <div class="track-title">
            <h2>Link</h2>
            <p>依頼先やショップ、SNSや制作過程などリンクまとめ。</p>
          </div>
        </div>
      </section>
    </main>

    <aside class="mini-list" aria-label="Playlist thumbnails">
      <a href="#about" aria-label="About"></a>
      <a href="#work" aria-label="Gallery"></a>
      <a href="#tool" aria-label="Tool"></a>
      <a href="#goods" aria-label="Goods"></a>
      <a href="#link" aria-label="Link"></a>
    </aside>

    <div class="player-controls" aria-label="Player controls">
      <button class="control-button" type="button" data-control="prev" aria-label="前のカードへ">
        <span class="icon previous" aria-hidden="true"></span>
      </button>
      <button class="control-button play" type="button" data-control="play" aria-label="このページを開く">
        <span class="icon play-icon" aria-hidden="true"></span>
      </button>
      <button class="control-button" type="button" data-control="next" aria-label="次のカードへ">
        <span class="icon next" aria-hidden="true"></span>
      </button>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
